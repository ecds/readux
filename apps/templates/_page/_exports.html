<h1 class="uk-text-large uk-text-bold uk-margin-small-bottom">Download and Export</h1>

<info-export label="Open Page Image" :pageonly="true" pagelink="{{ pagelink }}" icon="link-external" btnlabel="Open"></info-export>

{% if volume.pdf %}
  <div class="rx-info-content">
    <div class="rx-info-content-label uk-flex-between rx-flex">
      <a class="rx-action-btn" href="{{volume.pdf}}" target="_blank">
        <div class="uk-label rx-label-copy">
          PDF
        </div>
        <span class="uk-margin-small-left">View Volume PDF</span> 
      </a>
    </div> 
    <div class="rx-info-content-value">
    </div>
  </div>
{% endif %}

<info-export label="Export Citation in RIS" fullurl="https://{{ request.META.HTTP_HOST }}{% url 'ris' volume.pid %}" icon="download" btnlabel="Download"></info-export>
<info-export label="Send to Voyant" fullurl="https://voyant-tools.org/?corpus={{volume.pid}}&archive=https://{{ request.META.HTTP_HOST }}{% url 'PlainExport' 'v2' volume.pid %}" icon="arrow-up-right" btnlabel="Send"></info-export>
